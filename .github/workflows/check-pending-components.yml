name: Pending Component Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-pending:
    name: Verify route pending components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun (with lockfile cache)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pending-component check
        run: node scripts/check-pending-components.mjs
